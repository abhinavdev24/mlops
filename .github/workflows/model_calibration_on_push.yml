name: Model Retraining on Push to Main - Github Lab 2

on:
  push:
    branches:
      - main # Trigger the workflow on pushes to the main branch

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Github_Labs/Lab2

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.9

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest -q

  retrain:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Github_Labs/Lab2

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.9

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and Store Timestamp
        run: |
          timestamp=$(date '+%Y%m%d%H%M%S')
          echo "TIMESTAMP=$timestamp" >> $GITHUB_ENV

      - name: Check File Permissions
        run: ls -l src/train_model.py

      - name: Set File Permissions
        run: chmod +x src/train_model.py

      - name: Retrain Model
        run: |
          python src/train_model.py --timestamp "$TIMESTAMP"

      - name: Evaluate Model and Log Metrics
        run: |
          python src/evaluate_model.py --timestamp "$TIMESTAMP"
          metrics_filename="${TIMESTAMP}_metrics.json"
          mkdir -p metrics
          mv "$metrics_filename" "metrics/$metrics_filename"

      - name: Store and Version the New Model
        run: |
          model_filename="model_${TIMESTAMP}_dt_model.joblib"
          mkdir -p models
          mv "$model_filename" "models/$model_filename"

      - name: Commit and Push Changes
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          metrics_filename="metrics/${TIMESTAMP}_metrics.json"
          model_filename="models/model_${TIMESTAMP}_dt_model.joblib"
          git add -f "$metrics_filename" "$model_filename"
          if ! git diff --cached --quiet; then
            git commit -m "Add metrics and updated model for ${TIMESTAMP} [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
